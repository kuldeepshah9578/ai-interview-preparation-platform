<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview History</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            margin: 0;
            padding: 0;
        }

        .nav {
            background: #1f3c88;
            padding: 15px;
            text-align: center;
        }

        .nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }

        .container {
            width: 95%;
            max-width: 1100px;
            margin: 30px auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #1f3c88;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
            box-sizing: border-box;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        table, th, td {
            border: 1px solid #dcdcdc;
        }

        th {
            background: #1f3c88;
            color: white;
            padding: 12px;
        }

        td {
            padding: 10px;
            text-align: center;
        }

        tr:nth-child(even) {
            background: #f8fafc;
        }
    </style>
</head>
<body>

<div class="nav">
    <a href="/index.html">Home</a>
    <a href="/history.html">History</a>
    <a href="/dashboard.html">Dashboard</a>
</div>

<div class="container">
    <h1>Interview History</h1>

    <input type="text" id="searchBox" placeholder="Search by question keyword..." onkeyup="filterTable()">

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Question</th>
                <th>Category</th>
                <th>Difficulty</th>
                <th>Score</th>
                <th>Created At</th>
            </tr>
        </thead>
        <tbody id="historyTableBody">
        </tbody>
    </table>
</div>

<script>
    let historyData = [];

    async function loadHistory() {
        try {
            const response = await fetch('/api/v1/history');
            historyData = await response.json();
            renderTable(historyData);
        } catch (error) {
            console.error('Error loading history:', error);
        }
    }

    function renderTable(data) {
        const tableBody = document.getElementById('historyTableBody');
        tableBody.innerHTML = '';

        data.forEach(record => {
            const row = `
                <tr>
                    <td>${record.id}</td>
                    <td>${record.question}</td>
                    <td>${record.category}</td>
                    <td>${record.difficulty}</td>
                    <td>${record.score}</td>
                    <td>${record.createdAt || ''}</td>
                </tr>
            `;
            tableBody.innerHTML += row;
        });
    }

    function filterTable() {
        const keyword = document.getElementById('searchBox').value.toLowerCase();
        const filtered = historyData.filter(record =>
            record.question.toLowerCase().includes(keyword)
        );
        renderTable(filtered);
    }

    loadHistory();
</script>

<footer style="text-align:center;padding:20px;color:#666;font-size:14px;">
    Built by Kuldeep Kumar Shah | AI-Powered Interview Preparation Platform
</footer>

</body>
</html>
